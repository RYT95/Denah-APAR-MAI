<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Denah APAR MAI</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />

  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    #map {
      width: 100%;
      height: 100%;
    }

    /* PERBESAR TOMBOL ZOOM */
    .leaflet-control-zoom-in,
    .leaflet-control-zoom-out {
      font-size: 22px !important;
      width: 40px !important;
      height: 40px !important;
      line-height: 40px !important;
    }
    
    .leaflet-popup-content {
    font-size: 20px;      /* perbesar tulisan */
    font-weight: bold;    /* biar jelas */
    }

    .leaflet-popup-content-wrapper {
    padding: 12px 16px;   /* perbesar ruang popup */
    }

    .leaflet-popup-tip {
    width: 12px;
    height: 12px;         /* perbesar ujung segitiga */
    }

    .zoom-info {
    background: white;
    padding: 4px 8px;
    margin-left: 4px;
    border-radius: 4px;
    font-size: 14px;
    font-family: Arial, sans-serif;
    box-shadow: 0 0 3px rgba(0,0,0,0.3);
    }

    #toggleAparBtn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;

      /* Default kecil */
      width: 60px;
      overflow: hidden;
    }

    #toggleAparBtn img {
      width: 50px;
      transition: opacity 0.3s ease;
    }

    #toggleAparBtn .apar-count-text {
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      line-height: 1;
      letter-spacing: 0;
    }

    /* Saat ON (aktif) tombol melebar */
    #toggleAparBtn.active {
      width: 160px;
    }

    /* Saat ON angka muncul */
    #toggleAparBtn.active .apar-count-text {
      opacity: 1;
    }

    /* Saat OFF icon jadi abu-abu */
    #toggleAparBtn.off img {
      filter: grayscale(100%);
      opacity: 0.4;
    }

    #toggleApabBtn {
      position: absolute;
      top: 110px;
      right: 10px;
      background: white;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      width: 60px;
      overflow: hidden;
    }

    #toggleApabBtn .apab-count-text {
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.3s ease;
      line-height: 1;
      letter-spacing: 0;
    }

    #toggleApabBtn img {
      width: 50px;
    }

    #toggleApabBtn.active {
      width: 160px;
    }

    #toggleApabBtn.active .apab-count-text {
      opacity: 1;
    }

    #toggleApabBtn.off .apab-count-text {
      opacity: 0;
    }

    #toggleApabBtn.off img {
      filter: grayscale(100%);
      opacity: 0.4;
    }

    #apab-counter {
      position: absolute;
      top: 140px;
      right: 60px;
      background: white;
      padding: 12px 20px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0 0 6px rgba(0,0,0,0.3);
      z-index: 9999;
    }

    #toggleP3kBtn {
      position: absolute;
      top: 310px;   /* geser sedikit di bawah Shower */
      right: 10px;
      background: white;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      width: 60px;
      overflow: hidden;
    }

    #toggleP3kBtn img {
      width: 50px;
    }

    #toggleP3kBtn .p3k-count-text {
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #toggleP3kBtn.active {
      width: 160px;
    }

    #toggleP3kBtn.active .p3k-count-text {
      opacity: 1;
    }

    #toggleP3kBtn.off img {
      filter: grayscale(100%);
      opacity: 0.4;
    }

    #toggleShowerBtn {
      position: absolute;
      top: 210px;   /* letakkan di bawah Apab */
      right: 10px;
      background: white;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      width: 60px;
      overflow: hidden;
    }

    #toggleShowerBtn img {
      width: 50px;
    }

    #toggleShowerBtn .shower-count-text {
      font-family: Arial, sans-serif;
      font-size: 26px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    #toggleShowerBtn.active {
      width: 160px;
    }

    #toggleShowerBtn.active .shower-count-text {
      opacity: 1;
    }

    #toggleShowerBtn.off img {
      filter: grayscale(100%);
      opacity: 0.4;
    }

    #toggleEvacBtn {
      position: absolute;
      top: 410px;   /* di bawah tombol P3K */
      right: 10px;
      background: white;
      padding: 14px;
      border-radius: 14px;
      box-shadow: 0 0 8px rgba(0,0,0,0.3);
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s ease;
      width: 60px;
      overflow: hidden;
    }

    #toggleEvacBtn img {
      width: 50px;
    }

    #toggleEvacBtn .evac-label-text {
      font-family: Arial, sans-serif;
      font-size: 18px;
      font-weight: bold;
      opacity: 0;
      white-space: nowrap;
      transition: opacity 0.3s ease;
    }

    #toggleEvacBtn.active {
      width: 200px;   /* lebih lebar karena tulisan EVACUATION panjang */
    }

    #toggleEvacBtn.active .evac-label-text {
      opacity: 1;
    }

    #toggleEvacBtn.off img {
      filter: grayscale(100%);
      opacity: 0.4;
    }

  </style>
</head>
<body>

<div id="toggleAparBtn" class="off">
  <img src="img/apar.png" alt="APAR">
  <span class="apar-count-text">56</span>
</div>

<div id="toggleApabBtn" class="off">
  <img src="img/apab.png" alt="APAB">
  <span class="apab-count-text">6</span>
</div>

<div id="toggleP3kBtn" class="off">
  <img src="img/p3k.png" alt="P3K">
  <span class="p3k-count-text">14</span>
</div>

<div id="toggleShowerBtn" class="off">
  <img src="img/shower.png" alt="Shower">
  <span class="shower-count-text">6</span>
</div>

<div id="toggleEvacBtn" class="off">
  <img src="img/exit.png" alt="Evacuation">
  <span class="evac-label-text">EVACUATION</span>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
  // PETA + ZOOM LAMBAT
  const map = L.map("map", {
    crs: L.CRS.Simple,
    minZoom: -3,
    maxZoom: 2,
    zoomControl: true,
    maxBoundsViscosity: 1.0,
    wheelPxPerZoomLevel: 500   // PERLAMBAT ZOOM
  });

  // --- KOORDINAT ---
  map.on("click", function (e) {
    const x = e.latlng.lat.toFixed(0);
    const y = e.latlng.lng.toFixed(0);

    L.popup()
      .setLatLng(e.latlng)
      .setContent("X: " + x + "<br>Y: " + y)
      .openOn(map);
  });

  const w = 3508;
  const h = 4961;

  const bounds = [[0, 0], [h, w]];

  L.imageOverlay("img/denah.png", bounds).addTo(map);
  map.fitBounds(bounds);
  map.setZoom(-3);
  map.setMaxBounds(bounds);

  // --- OVERLAY DENAH EVAKUASI ---
  const evacOverlay = L.imageOverlay("img/evakuasi.png", bounds);

  // --- ICON APAR

  const aparIcon = L.icon({
    iconUrl: "img/apar.png",
    iconSize: [30, 40],
    iconAnchor: [15, 20]
  });

  const aparMarkers = [];

  // --- DAFTAR APAR ---
    const daftarApar = [
    //--- APAR AREA DEPAN ---
    { name: "APAR-01", y: 631, x: 1393 },
    { name: "APAR-02", y: 639, x: 1343 },
    { name: "APAR-03", y: 705, x: 1387 },
    { name: "APAR-04", y: 581, x: 1858 },
    { name: "APAR-05", y: 1009, x: 1359 },
    { name: "APAR-06", y: 1085, x: 1619 },
    { name: "APAR-07", y: 1106, x: 1585 },
    // --- APAR AREA GUDANG KIRI ---
    { name: "APAR-08", x: 1396, y: 1106 },
    { name: "APAR-09", x: 1471, y: 1106 },
    { name: "APAR-10", x: 1425, y: 1267 },
    { name: "APAR-11", x: 1425, y: 1320 },
    { name: "APAR-12", x: 1667, y: 1145 },
    { name: "APAR-13", x: 1609, y: 1224 },
    // --- APAR LORONG ---
    { name: "APAR-14", x: 1555, y: 1263 },
    { name: "APAR-15", x: 1587, y: 1304 },
    { name: "APAR-16", x: 1555, y: 1351 },
    { name: "APAR-17", x: 1587, y: 1388 },
    { name: "APAR-18", x: 1555, y: 1477 },
    { name: "APAR-19", x: 1555, y: 1607 },
    { name: "APAR-20", x: 1587, y: 1674 },
    { name: "APAR-21", x: 1555, y: 1765 },
    { name: "APAR-22", x: 1588, y: 1917 },
    { name: "APAR-23", x: 1588, y: 1986 },
    // --- APAR AREA GUDANG ---
    { name: "APAR-24", x: 1704, y: 1261 },
    { name: "APAR-25", x: 1734, y: 1299 },
    { name: "APAR-26", x: 1762, y: 1370 },
    { name: "APAR-27", x: 1762, y: 1438 },
    { name: "APAR-28", x: 1872, y: 1615 },
    { name: "APAR-29", x: 1786, y: 1592 },
    { name: "APAR-30", x: 1709, y: 1592 },
    { name: "APAR-31", x: 1649, y: 1763 },
    { name: "APAR-32", x: 1425, y: 1542 },
    { name: "APAR-33", x: 1502, y: 1765 },
    { name: "APAR-34", x: 1325, y: 1765 },
    // --- APAR AREA FORMULASI
    { name: "APAR-35", x: 1456, y: 1842 },
    { name: "APAR-36", x: 1615, y: 1802 },
    { name: "APAR-37", x: 1712, y: 1849 },
    { name: "APAR-38", x: 1784, y: 1866 },
    { name: "APAR-39", x: 1837, y: 1868 },
    { name: "APAR-40", x: 1828, y: 1925 },
    { name: "APAR-41", x: 1728, y: 1925 },
    { name: "APAR-42", x: 1614, y: 2070 },
    { name: "APAR-43", x: 1723, y: 2027 },
    { name: "APAR-44", x: 1814, y: 1998 },
    //--- APAR AREA JAGUNG ---
    { name: "APAR-45", x: 1368, y: 2924 },
    { name: "APAR-46", x: 1218, y: 2955 },
    { name: "APAR-47", x: 1358, y: 2980 },
    { name: "APAR-48", x: 1358, y: 3134 },
    { name: "APAR-49", x: 1322, y: 3352 },
    { name: "APAR-50", x: 1335, y: 3432 },
    { name: "APAR-51", x: 1256, y: 3602 },
    { name: "APAR-52", x: 1402, y: 3531 },
    { name: "APAR-53", x: 1379, y: 3637 },
    { name: "APAR-53", x: 1379, y: 3637 },
    { name: "APAR-54", x: 1526, y: 3585 },
    { name: "APAR-55", x: 1486, y: 3652 },
    { name: "APAR-56", x: 1462, y: 3652 },
    ];

    // --- ICON APAB ---
    const apabIcon = L.icon({
      iconUrl: "img/apab.png",
      iconSize: [40, 55],
      iconAnchor: [20, 28]
    });

    const apabMarkers = [];

    const daftarApab = [
      { name: "APAB-01", y: 1129, x: 1518 },
      { name: "APAB-02", y: 1434, x: 1632 },
      { name: "APAB-03", y: 1565, x: 1524 },
      { name: "APAB-04", y: 1566, x: 1630 },
      { name: "APAB-05", y: 1698, x: 1522 },
      { name: "APAB-06", y: 3361, x: 1228 },
    ]

    // --- ICON P3K ---
    const p3kIcon = L.icon({
      iconUrl: "img/p3k.png",
      iconSize: [30, 40],
      iconAnchor: [15, 20]
    });

    const p3kMarkers = [];

    const daftarP3k = [
      { name: "P3K-01", x: 1374, y: 643 },
      { name: "P3K-02", x: 1531, y: 893 },
      { name: "P3K-03", x: 1333, y: 975 },
      { name: "P3K-04", x: 1544, y: 1107 },
      { name: "P3K-05", x: 1663, y: 1277 },
      { name: "P3K-06", x: 1811, y: 1919 },
      { name: "P3K-07", x: 1877, y: 1945 },
      { name: "P3K-08", x: 1837, y: 1979 },
      { name: "P3K-09", x: 1855, y: 2047 },
      { name: "P3K-10", x: 1522, y: 2245 },
      { name: "P3K-11", x: 1290, y: 2933 },
      { name: "P3K-12", x: 1523, y: 3338 },
      { name: "P3K-13", x: 1355, y: 3404 },
      { name: "P3K-14", x: 1283, y: 3451 },
    ];

    // --- ICON SHOWER ---
    const showerIcon = L.icon({
      iconUrl: "img/shower.png",
      iconSize: [30, 40],
      iconAnchor: [15, 20]
    });

    const showerMarkers = [];

    const daftarShower = [
      { name: "SHOWER-01", x: 1359, y: 1016 },
      { name: "SHOWER-02", x: 1649, y: 1257 },
      { name: "SHOWER-03", x: 1605, y: 1404 },
      { name: "SHOWER-04", x: 1605, y: 1586 },
      { name: "SHOWER-05", x: 1542, y: 1581 },
      { name: "SHOWER-06", x: 1605, y: 1687 },
    ];

    // --- ICON ASSEMBLY POINT ---
    const assemblyIcon = L.icon({
      iconUrl: "img/ap.png",
      iconSize: [60, 68],
      iconAnchor: [30, 34]
    });

    // --- MARKER ASSEMBLY POINT ---
    const assemblyMarker = L.marker([680, 1585], { icon: assemblyIcon })
      .bindPopup("<b>ASSEMBLY POINT</b>");

    assemblyMarker.on("click", function () {
      assemblyMarker.openPopup();
      map.flyTo([680, 1585], map.getMaxZoom(), {
        animate: true,
        duration: 1.2
      });
    });
          
    // --- RENDER APAR ---
    daftarApar.forEach((apar) => {
      const marker = L.marker([apar.y, apar.x], { icon: aparIcon })
        .bindPopup(`<b>${apar.name}</b>`)

      aparMarkers.push(marker);

      marker.on("click", function () {
        marker.openPopup();
        map.flyTo([apar.y, apar.x], map.getMaxZoom(), {
          animate: true,
          duration: 1.2
        });
      });
    });

    // --- RENDER APAB ---
    daftarApab.forEach((apab) => {
      const marker = L.marker([apab.y, apab.x], { icon: apabIcon })
        .bindPopup(`<b>${apab.name}</b>`)

      apabMarkers.push(marker);

      // ➕ TAMBAH FITUR ZOOM SAAT DIKLIK
      marker.on("click", function () {
        marker.openPopup();
        map.flyTo([apab.y, apab.x], map.getMaxZoom(), {
          animate: true,
          duration: 1.2
        });
      });
    });

    // --- RENDER P3K ---
    daftarP3k.forEach((p3k) => {
      const marker = L.marker([p3k.y, p3k.x], { icon: p3kIcon })
        .bindPopup(`<b>${p3k.name}</b>`);

      p3kMarkers.push(marker);

      marker.on("click", function () {
        marker.openPopup();
        map.flyTo([p3k.y, p3k.x], map.getMaxZoom(), {
          animate: true,
          duration: 1.2
        });
      });
    });

    // --- RENDER SHOWER ---
    daftarShower.forEach((shower) => {
      const marker = L.marker([shower.y, shower.x], { icon: showerIcon })
        .bindPopup(`<b>${shower.name}</b>`);

      showerMarkers.push(marker);

      marker.on("click", function () {
        marker.openPopup();
        map.flyTo([shower.y, shower.x], map.getMaxZoom(), {
          animate: true,
          duration: 1.2
        });
      });
    });

    const toggleAparBtn = document.getElementById("toggleAparBtn");
    const toggleApabBtn = document.getElementById("toggleApabBtn");
    const toggleShowerBtn = document.getElementById("toggleShowerBtn");
    const toggleP3kBtn = document.getElementById("toggleP3kBtn");

    // --- TOGGLE APAR ---
    let aparVisible = false;
    toggleAparBtn.addEventListener("click", () => {
      aparVisible = !aparVisible;

      if (aparVisible) {
        toggleAparBtn.classList.add("active");
        toggleAparBtn.classList.remove("off");
        aparMarkers.forEach(m => m.addTo(map));
      } else {
        toggleAparBtn.classList.remove("active");
        toggleAparBtn.classList.add("off");
        aparMarkers.forEach(m => map.removeLayer(m));
      }
    });


    // --- TOGGLE APAB ---
    let apabVisible = false;
    toggleApabBtn.addEventListener("click", () => {
      apabVisible = !apabVisible;

      if (apabVisible) {
        toggleApabBtn.classList.add("active");
        toggleApabBtn.classList.remove("off");
        apabMarkers.forEach(m => m.addTo(map));
      } else {
        toggleApabBtn.classList.remove("active");
        toggleApabBtn.classList.add("off");
        apabMarkers.forEach(m => map.removeLayer(m));
      }
    });

    // ---TOGGLE P3K ---
    let p3kVisible = false;

    toggleP3kBtn.addEventListener("click", () => {
      p3kVisible = !p3kVisible;

      if (p3kVisible) {
        toggleP3kBtn.classList.add("active");
        toggleP3kBtn.classList.remove("off");
        p3kMarkers.forEach(m => m.addTo(map));
      } else {
        toggleP3kBtn.classList.remove("active");
        toggleP3kBtn.classList.add("off");
        p3kMarkers.forEach(m => map.removeLayer(m));
      }
    });

    // --- TOGGLE SHOWER ---
    let showerVisible = false;

    toggleShowerBtn.addEventListener("click", () => {
      showerVisible = !showerVisible;

      if (showerVisible) {
        toggleShowerBtn.classList.add("active");
        toggleShowerBtn.classList.remove("off");
        showerMarkers.forEach(m => m.addTo(map));
      } else {
        toggleShowerBtn.classList.remove("active");
        toggleShowerBtn.classList.add("off");
        showerMarkers.forEach(m => map.removeLayer(m));
      }
    });

    // --- TOGGLE EVACUATION ---
    const toggleEvacBtn = document.getElementById("toggleEvacBtn");
    let evacVisible = false;

    toggleEvacBtn.addEventListener("click", () => {
      evacVisible = !evacVisible;

      if (evacVisible) {
        toggleEvacBtn.classList.add("active");
        toggleEvacBtn.classList.remove("off");
        evacOverlay.addTo(map);
        assemblyMarker.addTo(map);
      } else {
        toggleEvacBtn.classList.remove("active");
        toggleEvacBtn.classList.add("off");
        map.removeLayer(evacOverlay);
        map.removeLayer(assemblyMarker);
      }
    });

</script>

</body>
</html>
